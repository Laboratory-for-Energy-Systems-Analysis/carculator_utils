package:
  name: carculator_utils
  version: {{ environ['VERSION'] }}

source:
  path: ..

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed .
  script_env:
    - VERSION
    - CONDA_BLD_PATH

requirements:
  build:
    - python
    - pip
    - setuptools
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - scipy
    - pyprind
    - pandas
    - xarray>=2024.1.0
    - numpy<2.0.0
    - klausen
    - xlrd
    - numexpr
    - bw2io<=0.8.12
    - pycountry
    - wurst
    - pyyaml

test:
  imports:
    - carculator_utils

about:
  home: https://github.com/romainsacchi/carculator_utils
  license: BSD License
  summary: 'Base classes and functions for the carculator package suite.'
license_family: BSD
